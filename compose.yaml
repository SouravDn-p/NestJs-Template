services:
  # backend:
  #   build: .
  #   ports:
  #     - '5000:5000'
  #   depends_on:
  #     - mongo
  #   environment:
  #     MONGO_URI: mongodb://mongo:27017/yourdb
  #   networks:
  #     - nest-network
  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - '27017:27017'
    volumes:
      - sourav-backend_mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: sourav

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: sourav
      ME_CONFIG_MONGODB_SERVER: mongo
    depends_on:
      - mongo

volumes:
  sourav-backend_mongodb_data:

